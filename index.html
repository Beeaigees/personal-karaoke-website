<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seemon's Karaoke</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="images/favicon.png" />
  </head>
  
  <body>
    <div class="hero">
      <video autoplay muted loop playsinline class="bg-video">
        <source src="videos/81676-576083179.mp4" type="video/mp4" />
      </video>
      <audio id="bg-music" loop>
        <source src="songs/Sun Araw - Horse Steppin' [wa3qqfgp1Ns].mp3" type="audio/mpeg" />
      </audio>

      <!-- Scanline overlay -->
      <div class="scanlines"></div>

      <!-- Konten di atas video -->
      <div class="hero-content">
        <h1 class="game-title">Seemon's<br />Karaoke</h1>
        <p class="subtitle">hotline miami edition</p>

        <nav class="menu-list">
          <a href="basket_case.html" class="menu-item">Green Day - Basket Case</a>
          <a href="boys_dont_cry.html" class="menu-item">The Cure - Boys Don't Cry</a>
          <a href="wifiskeleton.html" class="menu-item">Wifiskeleton - My 21st Reason</a>
          <a href="form.html" class="menu-item menu-item--secondary">Feedback</a>
        </nav>
      </div>
    </div>
    <script>
      const music = document.getElementById('bg-music');
      music.volume = 0.5;

      // Play begitu user pertama kali klik/sentuh di mana saja
      document.addEventListener('click', () => {
        if (music.paused) music.play();
      }, { once: true });
    </script>
  </body>
</html>
