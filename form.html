<!DOCTYPE html>
<html>
    <head>
        <title>Form</title>
    </head>
    
    <body>
            <center>

                <h2>Welcome to Seemon's karaoke feedback form!</h2>
            
                <form action="index.php" method="POST" enctype="multipart/form-data">
                    <label for="createAUsername">Create a Username:</label>
                    <input name="username" type="text" placeholder="Username" id="CreateAUsername" minlength="6" maxlength="10"  required>
                    
                    <br><br>
                    
                    <label for="email">Email:</label>
                    <input name="email" type="email" id="email" placeholder="Spongebob@gmail.com" minlength="3" maxlength="254" required>

                    <br><br>

                    <label for="quantity">How many bugs have you found?</label>
                    <input name="bugsQuantity" type="number" id="quantity" min="0" max="99" value="0" required >     
                    
                    <br><br>

                    <label for="proofs">Submit your proofs here (optional)</label>
                    <br>
                    <input name="bugProofs" type="file" id="proofs" accept="image/png, image/jpeg, image/jpg">
                    
                    <br><br>

                    <label for="feedback">Feedback:</label> 
                    <br>       

                    <!-- name gak boleh ada spasi dia sama kayak for dan id -->
                    <textarea name="feedbackBox" id="feedback" placeholder="Type your feedback here!" required></textarea>

                    <br><br>

                    <a href="index.html">
                        <input type="submit" style="color: blue;">
                    </a>

                    <br><br>

                    <a href="index.html">
                        <button style="color: blue;">
                            Homepage
                        </button>
                    </a>
                </form>
            </center>
        <script>
            document.getElementById('CreateAUsername').addEventListener('input', function() {
            localStorage.setItem('simpanUsername', this.value);
            });

            document.getElementById('email').addEventListener('input', function() {
            localStorage.setItem('simpanEmail', this.value);
            });

            document.getElementById('quantity').addEventListener('input', function() {
            localStorage.setItem('simpanQuantity', this.value);
            });
            
            document.getElementById('feedback').addEventListener('input', function() {
            localStorage.setItem('simpanFeedback', this.value);
            });

            const simpanUsername = localStorage.getItem("simpanUsername");
            if (simpanUsername) {
                document.getElementById("CreateAUsername").value = simpanUsername;
            }

            const simpanEmail = localStorage.getItem("simpanEmail");
            if (simpanEmail) {
                document.getElementById("email").value = simpanEmail;
            }

            const simpanQuantity = localStorage.getItem("simpanQuantity");
            if (simpanQuantity) {
                document.getElementById("quantity").value = simpanQuantity;
            }

            const simpanFeedback = localStorage.getItem("simpanFeedback");
            if (simpanFeedback) {
                document.getElementById("feedback").value = simpanFeedback;
            }
        </script>
    </body>    
</html>
